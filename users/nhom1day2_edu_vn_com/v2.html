<!doctype html>

    <!-- Core Styles -->

    <link
      rel="icon"

    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700;800&display=swap"

    />
    <style>
      /* ═══ NỀN LƯỚI & MẶT NẠ ═══ */
      .bg-grid {
        position: absolute;
        inset: 0;
        background-size: 60px 60px;
        background-position: 0 0;
        background-image:
          linear-gradient(to right, rgba(0, 0, 0, 0.04) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(0, 0, 0, 0.04) 1px, transparent 1px);
      }

      .grid-mask {
        position: absolute;
        inset: 0;
        mask-image: radial-gradient(
          ellipse at center,
          rgba(0, 0, 0, 1) 20%,
          transparent 80%
        );
        -webkit-mask-image: radial-gradient(
          ellipse at center,
          rgba(0, 0, 0, 1) 20%,
          transparent 80%
        );
        pointer-events: none;
      }

      @keyframes pulse-slow {
        0%,
        100% {
          opacity: 0.3;
          transform: translate(-50%, -50%) scale(1);
        }
        50% {
          opacity: 0.4;
          transform: translate(-50%, -50%) scale(1.05);
        }
      }

      .animate-pulse-slow {
        animation: pulse-slow 8s ease-in-out infinite;
      }

      /* Xử lý UI Checkbox Custom */
      .checkbox-checked {
        background-color: var(--accent) !important;
        border-color: var(--accent) !important;
        color: white !important;
      }

      /* Trượt Form Step */
      .step-2 {
        transform: translateX(-50%);
      }
    </style>
    <!-- Tailwind CSS (CDN - Giữ lại để hỗ trợ layout nhanh) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              bg: "#f5f5f3",
              surface: "rgba(255, 255, 255, 0.75)",
              border: "#e0e0de",
              borderDark: "#c0c0be",
              ink: "#0a0a0a",
              ink2: "#333332",
              ink3: "#666664",
              ink4: "#999997",
              accent: "#0a0a0a",

            fontFamily: {
              sans: ["Manrope", "sans-serif"],
              serif: ["Instrument Serif", "serif"],

      };
    </script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        // ==========================================
        // 1. ANIMATION HIỂN THỊ BAN ĐẦU
        // ==========================================
        setTimeout(() => {
          const skeleton = document.getElementById("skeleton-loader");
          const mainCard = document.getElementById("main-card");

          skeleton.style.opacity = "0";
          setTimeout(() => {
            skeleton.style.display = "none";
            mainCard.style.opacity = "1";
            mainCard.style.transform = "translateY(0)";
            document.getElementById("email").focus();
          }, 500);
        }, 800);

        // ==========================================
        // 2. LOGIC CHUYỂN BƯỚC (SLIDER FORM)
        // ==========================================
        const step1Form = document.getElementById("step1-form");
        const slider = document.getElementById("form-slider");
        const emailInput = document.getElementById("email");
        const displayEmail = document.getElementById("displayEmail");
        const btnNext = document.getElementById("btn-next");
        const btnBack = document.getElementById("btn-back");

        step1Form.addEventListener("submit", (e) => {
          e.preventDefault();
          if (!emailInput.value) return;

          // UI Loading button 1
          const btnText = btnNext.querySelector(".btn-text");
          const spinner = btnNext.querySelector(".spinner");
          btnText.classList.add("hidden");
          spinner.classList.remove("hidden");

          setTimeout(() => {
            btnText.classList.remove("hidden");
            spinner.classList.add("hidden");

            // Cập nhật text email & trượt ngang
            document.getElementById("display-email").innerText =
              emailInput.value;
            slider.classList.add("step-2");
            setTimeout(() => document.getElementById("password").focus(), 500);
          }, 600);
        });

        btnBack.addEventListener("click", () => {
          slider.classList.remove("step-2");
          setTimeout(() => emailInput.focus(), 500);
        });

        // ==========================================
        // 3. ẨN/HIỆN MẬT KHẨU & CUSTOM CHECKBOX
        // ==========================================
        const togglePassBtn = document.getElementById("toggle-pass-btn");
        const passwordInput = document.getElementById("password");
        const eyeIcon = document.getElementById("eye-icon");

        togglePassBtn.addEventListener("click", () => {
          const type =
            passwordInput.getAttribute("type") === "password"
              ? "text"
              : "password";
          passwordInput.setAttribute("type", type);

          if (type === "text") {
            eyeIcon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>`;
          } else {
            eyeIcon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>`;
          }
        });

        // Xử lý Custom Checkbox Ghi nhớ đăng nhập
        const rememberCheckbox = document.getElementById("remember");
        const checkboxUI = document.getElementById("checkbox-ui");

        // Đồng bộ UI với trạng thái checkbox (lấy từ file gi_nho.js nếu có)
        const syncCheckboxUI = () => {
          if (rememberCheckbox.checked) {
            checkboxUI.classList.add("checkbox-checked");
            checkboxUI.classList.remove(
              "border-borderDark",
              "text-transparent",
            );
          } else {
            checkboxUI.classList.remove("checkbox-checked");
            checkboxUI.classList.add("border-borderDark", "text-transparent");
          }
        };

        // Lắng nghe thay đổi từ thao tác user
        rememberCheckbox.addEventListener("change", syncCheckboxUI);
        // Khởi tạo chạy lần đầu
        setTimeout(syncCheckboxUI, 100);

        // Gắn hiệu ứng loading cho nút Login chính
        const mainForm = document.getElementById("dang-nhap");
        const submitBtn = document.getElementById("submit-btn");

        mainForm.addEventListener("submit", (e) => {
          // UI Loading button 2 (Logic fetch API vẫn chạy ở file input_pass.js)
          const btnText = submitBtn.querySelector(".btn-text");
          const spinner = submitBtn.querySelector(".spinner");
          btnText.classList.add("hidden");
          spinner.classList.remove("hidden");
          submitBtn.disabled = true;

          // Reset sau 3s (Phòng hờ lỗi mạng)
          setTimeout(() => {
            btnText.classList.remove("hidden");
            spinner.classList.add("hidden");
            submitBtn.disabled = false;
          }, 3000);
        });

        // ==========================================
        // 4. HIỆU ỨNG CANVAS NEURAL CIRCUIT
        // ==========================================
        const canvas = document.getElementById("neural-canvas");
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        let particles = [];

        const gridSize = 60;
        const speed = 1.5;
        const trailLength = 50;
        const numParticles = 25;
        const themeColor = { r: 51, g: 51, b: 50 }; // Màu Carbon #333332

        const resize = () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        };
        window.addEventListener("resize", resize);
        resize();

        class Particle {
          constructor() {
            this.history = [];
            this.snapToGrid();
            this.pickNewTarget();
          }

          snapToGrid() {
            const cols = Math.floor(canvas.width / gridSize);
            const rows = Math.floor(canvas.height / gridSize);
            this.x = Math.floor(Math.random() * cols) * gridSize;
            this.y = Math.floor(Math.random() * rows) * gridSize;
            this.targetX = this.x;
            this.targetY = this.y;
            this.vx = 0;
            this.vy = 0;
          }

          pickNewTarget() {
            const directions = [
              { dx: 0, dy: -gridSize },
              { dx: 0, dy: gridSize },
              { dx: -gridSize, dy: 0 },
              { dx: gridSize, dy: 0 },
            ];

            let validDirs = directions.filter((dir) => {
              const nx = this.x + dir.dx;
              const ny = this.y + dir.dy;
              if (nx < 0 || nx > canvas.width || ny < 0 || ny > canvas.height)
                return false;
              if (this.vx > 0 && dir.dx < 0) return false;
              if (this.vx < 0 && dir.dx > 0) return false;
              if (this.vy > 0 && dir.dy < 0) return false;
              if (this.vy < 0 && dir.dy > 0) return false;

              const isOccupied = particles.some(
                (p) => p !== this && p.targetX === nx && p.targetY === ny,
              );
              if (isOccupied) return false;
              return true;
            });

            if (validDirs.length === 0) {
              validDirs = directions.filter((dir) => {
                const nx = this.x + dir.dx;
                const ny = this.y + dir.dy;
                return (
                  nx >= 0 &&
                  nx <= canvas.width &&
                  ny >= 0 &&
                  ny <= canvas.height
                );
              });
            }

            if (validDirs.length > 0) {
              const move =
                validDirs[Math.floor(Math.random() * validDirs.length)];
              this.targetX = this.x + move.dx;
              this.targetY = this.y + move.dy;
              this.vx = move.dx === 0 ? 0 : move.dx > 0 ? speed : -speed;
              this.vy = move.dy === 0 ? 0 : move.dy > 0 ? speed : -speed;
            } else {
              this.vx = 0;
              this.vy = 0;
            }
          }

          update() {
            this.x += this.vx;
            this.y += this.vy;

            this.history.push({ x: this.x, y: this.y });
            if (this.history.length > trailLength) this.history.shift();

            if (
              (this.vx > 0 && this.x >= this.targetX) ||
              (this.vx < 0 && this.x <= this.targetX) ||
              (this.vy > 0 && this.y >= this.targetY) ||
              (this.vy < 0 && this.y <= this.targetY) ||
              (this.vx === 0 && this.vy === 0)
            ) {
              this.x = this.targetX;
              this.y = this.targetY;
              this.pickNewTarget();
            }
          }

          draw(ctx) {
            if (this.history.length < 2) return;

            for (let i = 1; i < this.history.length; i++) {
              const p1 = this.history[i - 1];
              const p2 = this.history[i];
              const opacity = (i / this.history.length) * 0.45;

              ctx.beginPath();
              ctx.moveTo(p1.x, p1.y);
              ctx.lineTo(p2.x, p2.y);
              ctx.strokeStyle = `rgba(${themeColor.r}, ${themeColor.g}, ${themeColor.b}, ${opacity})`;
              ctx.lineWidth = 2;
              ctx.stroke();
            }

            ctx.beginPath();
            ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
            ctx.fillStyle = `rgb(${themeColor.r}, ${themeColor.g}, ${themeColor.b})`;
            ctx.shadowBlur = 10;
            ctx.shadowColor = ctx.fillStyle;
            ctx.fill();
            ctx.shadowBlur = 0;
          }
        }

        for (let i = 0; i < numParticles; i++) {
          particles.push(new Particle());
        }

        const render = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          particles.forEach((p) => {
            p.update();
            p.draw(ctx);
          });
          requestAnimationFrame(render);
        };

        render();
      });
    </script>
  </body>
</html>
